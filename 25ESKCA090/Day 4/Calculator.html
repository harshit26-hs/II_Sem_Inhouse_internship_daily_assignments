<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <form>
        <input type="text" id="number1" placeholder="Enter First Number" >
        <br>
        <input type="text" id="number2" placeholder="Enter Second Number" >
        <br>

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <button type="button" 
        onclick="performArithmeticOperations()">
            Perform Arithmetic Operations
        </button>
        <div id="result">
        </div>
    </form>

    <script>
        function performArithmeticOperations(){
            let var1 = 10;
            const pi=3.14;
            const number1 = parseFloat(document.getElementById("number1").value);
            const number2 = parseFloat(document.getElementById("number2").value);
            const operator = document.getElementById("operator").value;
            
            let result = 0;
            switch(operator){
                case "+":
                    result = number1 + number2;
                    break;
                case "-":
                    result = number1 - number2;
                    break;
                case "*":
                    result = number1 * number2;
                    break;
                case "/":
                    if(number2 == 0){
                        result="Divide by zero error";
                    } else {
                        result = number1 / number2;
                    }
                    break;
                    
            }
            const resultDiv=document.getElementById("result");
            resultDiv.innerHTML=result;
         }
         
    </script>

</body>
</html>
