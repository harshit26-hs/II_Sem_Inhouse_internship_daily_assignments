<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

    <div class="container">
        <h2 class="text-center mb-4"> Student recordss </h2>
        <input type="text" id="search" class="form-control mb-4" placeholder="search Student">
        <div id="container" class="row g-4"></div>
        <div id="json"></div>
    </div>

    <script>

        const students = [
            { name: "Rahul", branch: "CSE", cgpa: 8.4 },
            { name: "Ankit", branch: "CSE", cgpa: 8.2 },
            { name: "Priya", branch: "CSE", cgpa: 9.4 },
            { name: "Kriti", branch: "AI", cgpa: 7.5 },
            { name: "Keshav", branch: "AI", cgpa: 7.2 },
            { name: "Lisa", branch: "AI", cgpa: 7.8 },
            { name: "Prisha", branch: "AI", cgpa: 7.1 },
            { name: "Divya", branch: "AI", cgpa: 7.9 },
            { name: "Yuvi", branch: "AI", cgpa: 8.5 },
            { name: "Prachi", branch: "AI", cgpa: 9.5 },
        ];


        let html = ""
        for (let i = 0; i < students.length; i++) {
            html += `
         <div class="col-md-4 card-item">
         <div class="card shadow">
            <div class="card-body">
                <h4>${students[i].name}</h4>
                <button class="btn btn-primary btn-sm mt-2">
                    Show Details
                </button>

                <div class="details mt-3" style="display:none;">
                    <p><strong>Branch:</strong> ${students[i].branch}</p>
                    <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                </div>
            </div>
        </div> 
        </div>   
        ` ;
        }

        document.getElementById("container").innerHTML = html;

        $(document).on("click", ".btn", function () {
            $(this).next(".details").slideToggle();
        });

        $("#search").keyup(function () {
            let val = $(this).val().toLowerCase();

            $(".card-item").each(function () {

                let name = $(this).find("h4").text().toLowerCase();

                if (name.includes(val)) {
                    $(this).show();
                }
                else {
                    $(this).hide();
                }
            });
        });

        function replacer(key, value) {
            if (key === "name" || key === "branch" || key === "cgpa") {
                return value;
            }
        }

        document.getElementById("json").innerHTML=JSON.stringify(students,replacer,4);
        
    </script>
</body>

</html>
